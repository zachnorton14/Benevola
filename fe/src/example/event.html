<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Event — Benevola</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="image-slot.js"></script>
<style>
  :root {
    --green-900: #1f4f3a;
    --green-700: #2d6a4f;
    --green-600: #357a5b;
    --green-500: #4a9171;
    --lime-400:  #95d558;
    --lime-300:  #b4e07a;
    --ink-900:   #1c1f23;
    --ink-700:   #3a3f45;
    --ink-500:   #6a7079;
    --ink-300:   #b6bac1;
    --surface:   #e9ebee;
    --surface-2: #eff1f4;
    --card:      #ffffff;
    --line:      #d8dbe0;
    --radius-card: 18px;
    --radius-tile: 14px;
    --radius-pill: 999px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--surface); }
  body {
    font-family: 'Open Sans', system-ui, -apple-system, Segoe UI, sans-serif;
    color: var(--ink-900);
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  ::selection { background: var(--lime-300); }

  /* layout */
  .page { max-width: 1320px; margin: 0 auto; padding: 18px 32px 0; }

  /* header */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 4px 18px;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-name {
    font-weight: 600; font-size: 22px; letter-spacing: -0.01em;
    color: var(--ink-900);
  }
  .nav-links { display: flex; align-items: center; gap: 36px; }
  .nav-link {
    font-size: 15px; color: var(--ink-700);
    text-decoration: underline; text-underline-offset: 4px;
    text-decoration-thickness: 1px; text-decoration-color: var(--ink-300);
    padding: 6px 2px; position: relative;
    transition: color .15s, text-decoration-color .15s;
  }
  .nav-link:hover { color: var(--green-700); text-decoration-color: var(--green-700); }
  .nav-link.has-caret { display: inline-flex; align-items: center; gap: 6px; }
  .caret { width: 10px; height: 10px; transition: transform .2s; }
  .caret.open { transform: rotate(180deg); }
  .dropdown {
    position: absolute; top: calc(100% + 10px); right: -8px;
    background: white; border-radius: 14px; padding: 8px;
    box-shadow: 0 18px 50px -18px rgba(20,30,25,.25), 0 2px 6px rgba(20,30,25,.06);
    min-width: 240px; z-index: 30; display: flex; flex-direction: column;
  }
  .dropdown a {
    padding: 10px 14px; border-radius: 10px; font-size: 14px;
    color: var(--ink-700); display: flex; align-items: center; gap: 10px;
  }
  .dropdown a:hover { background: var(--surface-2); color: var(--green-700); }
  .dropdown a .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--lime-400); }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--green-700);
    color: white; font-weight: 500; font-size: 15px;
    padding: 12px 22px;
    border-radius: var(--radius-pill);
    box-shadow: 0 8px 18px -10px rgba(45,106,79,.55);
    transition: transform .15s ease, background .15s ease, box-shadow .15s ease;
  }
  .btn:hover { background: var(--green-900); transform: translateY(-1px); box-shadow: 0 10px 22px -10px rgba(45,106,79,.7); }
  .btn:active { transform: translateY(0); }
  .btn.ghost { background: white; color: var(--green-700); box-shadow: inset 0 0 0 1.5px var(--green-700); }
  .btn.ghost:hover { background: var(--surface-2); color: var(--green-900); }
  .btn.sm { font-size: 13.5px; padding: 9px 16px; }
  .btn.danger-ghost { background: white; color: #b04040; box-shadow: inset 0 0 0 1.5px #d4a0a0; }
  .btn.danger-ghost:hover { background: #fdf4f4; }

  /* footer */
  footer {
    margin-top: 80px;
    padding: 40px 0 36px;
    border-top: 1px solid var(--line);
    display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 36px;
  }
  footer h4 {
    margin: 0 0 14px; font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-500); font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  footer a { font-size: 14px; color: var(--ink-700); }
  footer a:hover { color: var(--green-700); }
  .foot-brand-blurb { font-size: 13px; color: var(--ink-500); margin: 14px 0 0; max-width: 280px; line-height: 1.55; }
  .legal {
    grid-column: 1 / -1; margin-top: 24px; padding-top: 18px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--ink-500); font-family: 'JetBrains Mono', monospace;
  }

  /* toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--ink-900); color: white; padding: 12px 18px;
    border-radius: 12px; font-size: 14px;
    box-shadow: 0 14px 32px -12px rgba(0,0,0,.3);
    opacity: 0; transition: opacity .2s, transform .25s; z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* image-slot */
  image-slot {
    --is-placeholder-bg: linear-gradient(135deg, #d8dde2 0%, #c6ccd2 100%);
    --is-placeholder-color: #5a6168;
    --is-placeholder-font: 'JetBrains Mono', monospace;
  }

  /* form inputs */
  .field-input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    font-family: 'Open Sans', sans-serif;
    font-size: 15px;
    color: var(--ink-900);
    background: white;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    line-height: 1.5;
  }
  .field-input:focus {
    border-color: var(--green-600);
    box-shadow: 0 0 0 3px rgba(53,122,91,.1);
  }
  .field-input.large {
    font-size: 26px; font-weight: 600;
    letter-spacing: -0.015em; line-height: 1.2;
    padding: 10px 14px;
  }
  .field-input.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .field-input.disabled {
    background: var(--surface-2);
    color: var(--ink-300);
    cursor: not-allowed;
  }
  textarea.field-input { resize: vertical; }

  /* edit mode banner */
  .edit-banner {
    position: sticky;
    top: 0;
    z-index: 40;
    background: var(--ink-900);
    color: white;
    padding: 11px 0;
    margin: 0 -32px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-left: 32px;
    padding-right: 32px;
    gap: 20px;
  }
  .edit-banner-label {
    display: flex; align-items: center; gap: 10px;
    font-size: 13.5px; font-weight: 500;
  }
  .edit-banner-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--lime-400);
    animation: blink 1.8s ease-in-out infinite;
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.35; } }

  /* section label */
  .section-label {
    font-size: 11px; letter-spacing: 0.13em; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace; color: var(--ink-500);
    display: block; margin-bottom: 6px;
  }

  /* meta pill */
  .meta-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 13px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    white-space: nowrap;
  }
  .meta-pill.outline {
    background: white;
    border: 1px solid var(--line);
    color: var(--ink-700);
  }
  .meta-pill.filled {
    background: var(--green-700);
    color: white;
    border: none;
  }
  .meta-pill.muted {
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--ink-500);
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="event.jsx"></script>
</body>
</html>
